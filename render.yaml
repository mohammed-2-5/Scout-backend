services:
  - type: web
    name: scout-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run init-db
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./database/scout.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: API_PREFIX
        value: /api/v1
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: NODE_VERSION
        value: "18"
      # Set these in the Render dashboard (Environment tab) — do NOT commit secrets
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
